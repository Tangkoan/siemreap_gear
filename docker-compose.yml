version: '3.8'

services:
  # សេវាកម្មសម្រាប់កម្មវិធី Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # 1. Mount កូដកម្មវិធីរបស់អ្នកពីម៉ាស៊ីនពិត
      - .:/var/www/html
      # 2. ប្រើ Named Volume សម្រាប់ vendor និង node_modules ដើម្បីល្បឿនលឿន
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    networks:
      - laravel

  # សេវាកម្មสำหรับ Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Nginx ត្រូវការចូលទៅកូដរួម ដើម្បីអាចបម្រើ Static file (CSS, JS)
      - .:/var/www/html
      # បន្ថែមឯកសារកំណត់រចនាសម្ព័ន្ធរបស់ Nginx
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  # សេវាកម្មសម្រាប់ Database (MySQL)
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-user}
    volumes:
      # ប្រើ Named Volume សម្រាប់ទិន្នន័យ Database ដើម្បីរក្សាទុកទិន្នន័យ
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - laravel

# កំណត់ Named Volumes នៅទីនេះ
volumes:
  db_data:
    driver: local
  vendor_data:
    driver: local
  node_modules_data:
    driver: local

networks:
  laravel:
    driver: bridge
